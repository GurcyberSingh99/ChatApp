version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: chatapp_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatapp_backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/chatapp
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:

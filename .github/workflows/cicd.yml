name: Java CI/CD Pipeline with Maven and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Automatic Maven Build
      run: mvn clean package -DskipTests

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false # Set to true when configured with DockerHub credentials
        tags: realtime-chat-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Output Pipeline Completion Status
      run: echo "CI/CD Pipeline processed successfully. Artifacts and image staged."
